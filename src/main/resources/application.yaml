spring:
  application:
    name: ovc-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/ovc
    username: ${APP_USERNAME}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
