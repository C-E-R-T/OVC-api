name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ovc-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ovc-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ovc-backend
            cat <<EOF > .env
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=${{ secrets.DB_PORT }}
            APP_PORT=${{ secrets.APP_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}
            JWT_REFRESH_TOKEN_EXPIRATION=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}
            APP_PORT=${{secrets.APP_PORT}}
            NAVER_CLIENT_ID=${{secrets.NAVER_CLIENT_ID}}
            NAVER_CLIENT_SECRET=${{secrets.NAVER_CLIENT_SECRET}}
            OPEN_API_CERT_CATEGORY_KEY=${{secrets.OPEN_API_CERT_CATEGORY_KEY}}
            OPEN_API_CERT_CATEGORY_BASEURL=${{secrets.OPEN_API_CERT_CATEGORY_BASEURL}}
            OPEN_API_CERT_DETAIL_KEY=${{secrets.OPEN_API_CERT_DETAIL_KEY}}
            OPEN_API_CERT_DETAIL_BASEURL=${{secrets.OPEN_API_CERT_DETAIL_BASEURL}}
            OPEN_API_SCHEDULE_KEY=${{secrets.OPEN_API_SCHEDULE_KEY}}
            OPEN_API_SCHEDULE_BASEURL=${{secrets.OPEN_API_SCHEDULE_BASEURL}}
            
            EOF

            docker-compose pull
            
            docker-compose down
            docker-compose up -d --force-recreate
            docker image prune -a -f